user_agent: "threat-brief/1.0 (contact: your-email@example.com)"

llm:
  endpoint: "http://localhost:1234/v1"
  model: "local-model"
  max_tokens: 4096
  temperature: 0.3

sources:
  cisa_kev:
    url: "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
  msrc:
    url: "https://api.msrc.microsoft.com/cvrf/v3.0/updates"
  aws_security:
    url: "https://aws.amazon.com/security/security-bulletins/"
  hackernews_threatintel:
    url: "https://feeds.feedburner.com/TheHackersNews"
  krebs:
    url: "https://krebsonsecurity.com/feed/"
  isc_sans:
    url: "https://isc.sans.edu/rssfeed_full.xml"
    infocon_url: "https://isc.sans.edu/infocon.txt"

org_profile:
  company_name: "REDACTED"
  industry:
    - "Financial Services"
    - "FinTech"
    - "Banking"
  tech_stack:
    operating_systems:
      - "Windows 11"
      - "Windows Server 2022"
      - "macOS"
    infrastructure:
      - "Active Directory"
      - "Azure AD / Entra ID"
      - "AWS (EC2, S3, Lambda, RDS)"
    applications:
      - "BeyondTrust Remote Support"
      - "SolarWinds"
      - "Microsoft 365"
      - "Ivanti Endpoint Manager"
    languages_and_frameworks:
      - "Python"
      - "JavaScript / Node.js"
      - ".NET"
    security_tools:
      - "CrowdStrike Falcon"
      - "Tenable.io"
      - "Splunk"

reports_dir: "./reports"
default_hours: 48
